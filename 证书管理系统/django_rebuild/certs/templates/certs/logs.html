{% extends "certs/base.html" %}
{% block title %}查询日志{% endblock %}
{% block content %}
<div class="card">
  <table>
    <tr><th>员工</th><th>来源</th><th>状态</th><th>备注</th><th>时间</th></tr>
    {% for log in logs %}
      <tr><td>{{ log.task.employee.name }}</td><td>{{ log.query_source }}</td><td>{{ log.status }}</td><td>{{ log.note }}</td><td>{{ log.created_at }}</td></tr>
    {% empty %}
      <tr><td colspan="5">暂无日志</td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
