<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}证书平台{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
    header { background: white; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; }
    nav { max-width: 1200px; margin: 0 auto; padding: 14px 20px; display: flex; gap: 16px; flex-wrap: wrap; }
    nav a { color: #0f766e; text-decoration: none; font-weight: 600; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px 40px; }
    .card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: 0 8px 20px rgba(15,23,42,.04); }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 14px; }
    th { background: #f9fafb; }
    form.inline { display: inline; }
    input, select, textarea, button { font: inherit; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; }
    button, .btn { background: #0f766e; color: white; border: 0; cursor: pointer; text-decoration: none; display: inline-block; }
    .grid { display: grid; gap: 16px; }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .muted { color: #6b7280; }
    .tag { display:inline-block; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">首页</a>
      <a href="/employees">员工</a>
      <a href="/certificates">证书</a>
      <a href="/expiring">到期预警</a>
      <a href="/queue">查询队列</a>
      <a href="/logs">日志</a>
      <a href="/search">搜索</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
